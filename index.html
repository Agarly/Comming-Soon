<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agarly</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <link rel="apple-touch-icon" href="logo.svg">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
      background: linear-gradient(-45deg, #a8d5ba, #8ea9db, #c3f0ca, #a0c4ff);
      background-size: 400% 400%;
      animation: gradientMove 12s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .wrapper {
      text-align: center;
      animation: fadeIn 1.5s ease forwards;
      padding: 20px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      width: 240px;
      margin-bottom: 20px;
      filter: drop-shadow(0 15px 30px rgba(0,0,0,0.2));
      transition: transform 0.2s ease, filter 0.3s ease;
      animation: float 4s ease-in-out infinite;
      will-change: transform;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .logo:hover {
      transform: scale(1.05);
      filter: drop-shadow(0 20px 40px rgba(0,0,0,0.3));
    }

    h1 {
      font-size: 30px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: rgba(0,0,0,0.85);
      margin-bottom: 25px;
      opacity: 0;
      animation: textReveal 1.5s ease forwards;
      animation-delay: 0.5s;
    }

    @keyframes textReveal {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Progress */
    .progress-container {
      width: 220px;
      height: 6px;
      background: rgba(0,0,0,0.1);
      border-radius: 10px;
      overflow: hidden;
      margin: auto;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: rgba(0,0,0,0.6);
      border-radius: 10px;
      transition: width 0.1s linear;
    }

    /* Premium Cursor */
    .cursor-glass {
      position: fixed;
      top: 0;
      left: 0;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 
        0 0 25px rgba(255,255,255,0.35),
        inset 0 0 12px rgba(255,255,255,0.25);
      z-index: 999;
      transition: transform 0.2s ease;
    }

    /* Desktop only custom cursor */
    @media (hover: hover) and (pointer: fine) {
      body {
        cursor: none;
      }
    }

    /* Mobile */
    @media(max-width: 600px){
      .logo { width: 180px; }
      h1 { font-size: 22px; }
    }

  </style>
</head>

<body>

  <div class="wrapper">
    <img src="logo.svg" class="logo" id="logo" alt="Agarly Logo">
    <h1>We’re not ready yet… but you should be.</h1>

    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <div class="cursor-glass" id="cursorGlass"></div>

  <script>
    // Progress animation
    let progress = 0;
    const bar = document.getElementById("progressBar");

    const interval = setInterval(() => {
      progress += 1;
      bar.style.width = progress + "%";
      if(progress >= 100) clearInterval(interval);
    }, 30);

    // Cursor (desktop only)
    const cursor = document.getElementById("cursorGlass");

    if (window.matchMedia("(hover: hover) and (pointer: fine)").matches) {

      let mouseX = 0, mouseY = 0;
      let currentX = 0, currentY = 0;

      document.addEventListener("mousemove", (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
      });

      function animateCursor() {
        currentX += (mouseX - currentX) * 0.15;
        currentY += (mouseY - currentY) * 0.15;

        cursor.style.left = currentX + "px";
        cursor.style.top = currentY + "px";

        requestAnimationFrame(animateCursor);
      }

      animateCursor();

      const logo = document.getElementById("logo");

      // Hover scale
      logo.addEventListener("mouseenter", () => {
        cursor.style.transform = "translate(-50%, -50%) scale(1.4)";
      });

      logo.addEventListener("mouseleave", () => {
        cursor.style.transform = "translate(-50%, -50%) scale(1)";
      });

      // Parallax
      document.addEventListener("mousemove", (e) => {
        const x = (window.innerWidth / 2 - e.clientX) / 40;
        const y = (window.innerHeight / 2 - e.clientY) / 40;

        logo.style.transform = `translate(${x}px, ${y}px)`;
      });

    } else {
      cursor.style.display = "none";
    }

  </script>

</body>
</html>
